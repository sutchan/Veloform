<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="120" height="120" rx="20" fill="url(#bgGrad)"/>
  
  <!-- Bicycle Frame - Abstract V shape -->
  <g fill="none" stroke="url(#accentGrad)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
    <!-- Main V frame -->
    <path d="M35 80 L60 45 L85 80" />
    <!-- Top tube -->
    <path d="M42 55 L78 55" />
    <!-- Seat post -->
    <path d="M60 45 L55 30 L65 30" />
    <!-- Handlebars -->
    <path d="M80 45 L90 40 L90 48" />
  </g>
  
  <!-- Wheels - Stylized circles -->
  <g fill="none" stroke="url(#accentGrad)" stroke-width="3" opacity="0.7">
    <!-- Front wheel -->
    <circle cx="35" cy="80" r="18"/>
    <circle cx="35" cy="80" r="12"/>
    <circle cx="35" cy="80" r="6"/>
    
    <!-- Rear wheel -->
    <circle cx="85" cy="80" r="18"/>
    <circle cx="85" cy="80" r="12"/>
    <circle cx="85" cy="80" r="6"/>
  </g>
  
  <!-- Chain ring accent -->
  <circle cx="60" cy="65" r="8" fill="url(#accentGrad)" opacity="0.8"/>
  
  <!-- Speed lines -->
  <g stroke="url(#accentGrad)" stroke-width="2" opacity="0.4">
    <line x1="15" y1="50" x2="25" y2="50"/>
    <line x1="20" y1="60" x2="30" y2="60"/>
    <line x1="15" y1="70" x2="25" y2="70"/>
  </g>
  
  <!-- Veloform text -->
  <text x="60" y="105" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#f59e0b" text-anchor="middle" letter-spacing="2">VELOFORM</text>
</svg>
