<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D4FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00D4FF;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Outer circle / wheel suggestion -->
  <circle cx="100" cy="100" r="85" stroke="url(#grad1)" stroke-width="4" fill="none" opacity="0.3"/>

  <!-- Inner circle / hub suggestion -->
  <circle cx="100" cy="100" r="25" stroke="url(#grad2)" stroke-width="3" fill="none"/>

  <!-- Veloform stylized "V" - bike frame geometry -->
  <!-- Left stay / fork -->
  <path d="M55 145 L100 100 L55 55" stroke="url(#grad1)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Right stay / down tube -->
  <path d="M145 145 L100 100 L145 55" stroke="url(#grad2)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Cross bar / top tube suggestion -->
  <path d="M65 65 L135 65" stroke="url(#grad1)" stroke-width="6" stroke-linecap="round" opacity="0.8"/>

  <!-- Center hub accent -->
  <circle cx="100" cy="100" r="8" fill="url(#grad2)"/>

  <!-- Spoke accents - top -->
  <line x1="100" y1="75" x2="100" y2="35" stroke="url(#grad1)" stroke-width="2" opacity="0.5"/>
  <!-- Spoke accents - bottom -->
  <line x1="100" y1="125" x2="100" y2="165" stroke="url(#grad2)" stroke-width="2" opacity="0.5"/>
  <!-- Spoke accents - left -->
  <line x1="75" y1="100" x2="35" y2="100" stroke="url(#grad1)" stroke-width="2" opacity="0.5"/>
  <!-- Spoke accents - right -->
  <line x1="125" y1="100" x2="165" y2="100" stroke="url(#grad2)" stroke-width="2" opacity="0.5"/>

  <!-- Corner accents -->
  <circle cx="55" cy="55" r="5" fill="#00D4FF"/>
  <circle cx="145" cy="55" r="5" fill="#7C3AED"/>
  <circle cx="55" cy="145" r="5" fill="#7C3AED"/>
  <circle cx="145" cy="145" r="5" fill="#00D4FF"/>
</svg>